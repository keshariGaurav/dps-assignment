version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: erp_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: erp_system
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - erp_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - erp_network

  litellm:
    image: ghcr.io/berriai/litellm:main
    container_name: litellm
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ${PWD}/config.yaml:/app/config.yaml
    entrypoint: []
    command: ["litellm", "--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env
    environment:
      - LITELLM_LOG=DEBUG
    networks:
      - erp_network

  app:
    build: .
    container_name: erp_app
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
      litellm:
        condition: service_started
    env_file:
      - .env
    networks:
      - erp_network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  erp_network:
    driver: bridge
